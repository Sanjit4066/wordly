<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="40" fill="#fbf6f1" />
  <rect x="40" y="40" width="1200" height="80" rx="20" fill="#fff" stroke="#e2d8d1" stroke-width="2" />
  <text x="80" y="95" font-family="Inter, sans-serif" font-size="28" fill="#111">Wordly</text>
  <text x="260" y="95" font-family="Inter, sans-serif" font-size="20" fill="#666">Home&nbsp;&nbsp;Library&nbsp;&nbsp;Practice</text>
  <text x="80" y="180" font-family="Georgia, serif" font-size="72" fill="#111">ephemeral</text>
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="22" fill="#d76b4a">Adjective&nbsp;&nbsp;•&nbsp;&nbsp;//ˈfɛmərəl//</text>
  <rect x="80" y="320" width="530" height="240" rx="30" fill="#fff" stroke="#e2d8d1" stroke-width="2" />
  <text x="110" y="370" font-family="Georgia, serif" font-size="28" fill="#111">"Lasting for a very short time; transitory;&nbsp;fleeting; specifically, in a biological context, existing or living for only one day."</text>
  <rect x="640" y="320" width="540" height="240" rx="30" fill="#fff" stroke="#e2d8d1" stroke-width="2" />
  <text x="670" y="370" font-family="Inter, sans-serif" font-size="18" fill="#d76b4a">Etymological Roots</text>
  <text x="670" y="410" font-family="Inter, sans-serif" font-size="16" fill="#666">Derived from the Ancient Greek word ‘ephemeros’, meaning ‘lasting only a day’.</text>
</svg>
