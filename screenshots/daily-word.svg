  <text x="80" y="260" font-family="Inter, sans-serif" font-size="22" fill="#111">Evoking a keen sense of sadness or regret; sharply affecting the feelings or the senses.</text>
  <rect x="80" y="320" width="1120" height="300" rx="40" fill="#fff" stroke="#e2d8d1" stroke-width="2" />
